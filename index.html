<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Kanit', sans-serif; 
      background: url('https://www.transparenttextures.com/patterns/white-diamond.png'), linear-gradient(135deg, #fff5ed 0%, #ffedd5 100%);
      background-attachment: fixed;
    }
    .orange-gradient { background: linear-gradient(90deg, #f97316 0%, #fb923c 100%); }
    .card-zoom:hover { transform: translateY(-5px); transition: all 0.3s ease; }
  </style>
</head>
<body class="min-h-screen text-gray-800">

  <nav class="orange-gradient text-white p-4 shadow-xl sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="bg-white p-2 rounded-lg text-orange-600 shadow-inner">
          <i class="fas fa-eye text-2xl"></i>
        </div>
        <h1 class="text-xl font-bold tracking-tight">OR-SKT EYE SYSTEM</h1>
      </div>
      <button onclick="toggleModal('formModal')" class="bg-white text-orange-600 px-5 py-2 rounded-full font-bold shadow-md hover:bg-orange-50 transition active:scale-95">
        <i class="fas fa-plus-circle mr-1"></i> บันทึกข้อมูล
      </button>
    </div>
  </nav>

  <main class="container mx-auto p-4 lg:p-8">
    
    <h2 class="text-2xl font-bold text-orange-700 mb-4 flex items-center gap-2">
      <i class="fas fa-chart-pie"></i> สรุปยอดคงคลังเครื่องมือ
    </h2>
    <div id="dashboardGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-10">
      </div>

    <hr class="border-orange-200 mb-8">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-gray-700">ประวัติการดำเนินงาน</h2>
      <button onclick="loadData()" class="text-orange-600 hover:rotate-180 transition-all duration-500">
        <i class="fas fa-sync-alt text-xl"></i>
      </button>
    </div>

    <div id="loader" class="text-center py-20">
      <div class="inline-block animate-bounce bg-orange-400 p-3 rounded-full shadow-lg">
        <i class="fas fa-microscope text-white text-3xl"></i>
      </div>
      <p class="mt-4 text-orange-600 font-medium">กำลังเตรียมข้อมูลเครื่องมือ...</p>
    </div>

    <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <div id="formModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-slide-up">
      <div class="orange-gradient p-6 text-white flex justify-between items-center">
        <h2 class="text-2xl font-bold">บันทึกรายการเครื่องมือ</h2>
        <button onclick="toggleModal('formModal')" class="hover:bg-white/20 p-2 rounded-full"><i class="fas fa-times"></i></button>
      </div>
      
      <form id="mainForm" class="p-6 space-y-4 max-h-[75vh] overflow-y-auto" oninput="validate()">
        <div>
          <label class="block text-sm font-bold text-orange-600 mb-1">สถานะ</label>
          <select id="actionType" required class="w-full border-2 border-orange-100 p-3 rounded-2xl focus:ring-2 focus:ring-orange-400 outline-none">
            <option value="">-- เลือกสถานะ --</option>
            <option value="รับเข้า">รับเข้า</option>
            <option value="จ่ายออก">จ่ายออก</option>
            <option value="ส่งผ้าซัก">ส่งผ้าซัก</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-bold text-orange-600 mb-1">ชื่อเครื่องมือ/อุปกรณ์</label>
          <select id="equipment" required class="w-full border-2 border-orange-100 p-3 rounded-2xl focus:ring-2 focus:ring-orange-400 outline-none">
            <option value="">-- เลือกรายการอุปกรณ์ --</option>
            <option value="ผ้าตา">ผ้าตา</option>
            <option value="Fusion Dual Pump">Fusion Dual Pump</option>
            <option value="เครื่องมือตา">เครื่องมือตา</option>
            <option value="set ล้างตา">set ล้างตา</option>
            <option value="เครื่องมือแยก">เครื่องมือแยก</option>
            <option value="ตัวจับกล้อง">ตัวจับกล้อง</option>
            <option value="จี้ตา">จี้ตา</option>
            <option value="set Blepharo">set Blepharo</option>
            <option value="เลนส์nanex">เลนส์nanex</option>
            <option value="ผ้ารูตา">ผ้ารูตา</option>
            <option value="ด้าม blad">ด้าม blad</option>
            <option value="ถ้วย">ถ้วย</option>
            <option value="ชุด Forcep">ชุด Forcep</option>
            <option value="Hand pice">Hand pice</option>
            <option value="Westcot tenotomy E25-334">Westcot tenotomy E25-334</option>
            <option value="Eye spce ขดลวด">Eye spce ขดลวด</option>
            <option value="Holder ดัดเข็ม">Holder ดัดเข็ม</option>
            <option value="SR">SR</option>
            <option value="ชุด ECCE (7ชิ้น)">ชุด ECCE (7ชิ้น)</option>
            <option value="Corneal scissors">Corneal scissors</option>
            <option value="Simco">Simco</option>
            <option value="0.12 forcep Taitanium">0.12 forcep Taitanium</option>
            <option value="Lester Lens">Lester Lens</option>
            <option value="Sinskey">Sinskey</option>
            <option value="Caliper">Caliper</option>
            <option value="Clamp โค้ง">Clamp โค้ง</option>
            <option value="ชุด Tx">ชุด Tx</option>
            <option value="ถาด scrub ตา">ถาด scrub ตา</option>
            <option value="อับสำลีเล็ก">อับสำลีเล็ก</option>
            <option value="ยกเลิก จี้ตาหัวกลม">ยกเลิก จี้ตาหัวกลม</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-orange-600 mb-1">จำนวน</label>
            <input type="number" id="quantity" required placeholder="0" class="w-full border-2 border-orange-100 p-3 rounded-2xl outline-none focus:border-orange-400">
          </div>
          <div>
            <label class="block text-sm font-bold text-orange-600 mb-1">Serial No.</label>
            <input type="text" id="serialNo" required placeholder="SN-xxxx" class="w-full border-2 border-orange-100 p-3 rounded-2xl outline-none focus:border-orange-400">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-orange-600 mb-1">ผู้ส่งข้อมูล</label>
          <input type="text" id="submittedBy" required placeholder="ชื่อ-นามสกุล" class="w-full border-2 border-orange-100 p-3 rounded-2xl outline-none focus:border-orange-400">
        </div>

        <div class="bg-orange-50 p-4 rounded-2xl border-2 border-dashed border-orange-200">
          <label class="block text-sm font-bold text-orange-700 mb-2">อัปโหลดรูปภาพ / ไฟล์</label>
          <input type="file" id="fileInput" onchange="preview(this)" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-orange-500 file:text-white hover:file:bg-orange-600 cursor-pointer">
          <img id="imgPre" class="mt-3 hidden rounded-xl shadow-md max-h-40 mx-auto border-2 border-white">
        </div>

        <button type="button" id="submitBtn" disabled onclick="save()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg disabled:bg-gray-200 disabled:text-gray-400 transition-all active:scale-95">
          <i class="fas fa-paper-plane mr-2"></i> บันทึกข้อมูลเข้า Sheet
        </button>
      </form>
    </div>
  </div>

  <footer class="mt-20 p-10 text-center bg-white border-t border-orange-100 shadow-inner">
    <p class="text-gray-500 font-medium">Copyright © 2026 ระบบจัดเก็บข้อมูลเครื่องมือผ่าตัดตา | By พยาบาลตา OR-SKT</p>
  </footer>

  <script>
    let fileObj = { data: null, name: "", mime: "" };

    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
    
    function validate() {
      const isValid = document.getElementById('mainForm').checkValidity();
      document.getElementById('submitBtn').disabled = !isValid;
    }

    function preview(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        fileObj = { data: e.target.result, name: file.name, mime: file.type };
        if (file.type.startsWith('image/')) {
          const pre = document.getElementById('imgPre');
          pre.src = e.target.result;
          pre.classList.remove('hidden');
        }
      };
      reader.readAsDataURL(file);
    }

    function save() {
      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> กำลังบันทึก...';
      btn.disabled = true;

      const data = {
        actionType: document.getElementById('actionType').value,
        equipment: document.getElementById('equipment').value,
        quantity: document.getElementById('quantity').value,
        serialNo: document.getElementById('serialNo').value,
        submittedBy: document.getElementById('submittedBy').value,
        fileData: fileObj.data,
        fileName: fileObj.name,
        fileMimeType: fileObj.mime
      };

      google.script.run.withSuccessHandler(() => {
        alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
        location.reload();
      }).uploadData(data);
    }

    function loadData() {
      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('cardContainer').innerHTML = '';
      
      google.script.run.withSuccessHandler(res => {
        document.getElementById('loader').classList.add('hidden');
        renderDashboard(res.equipmentStats);
        
        const container = document.getElementById('cardContainer');
        res.items.forEach(item => {
          const isImg = item.fileType.startsWith('image/');
          const icon = item.fileType.includes('pdf') ? 'fa-file-pdf text-red-500' : 'fa-file-word text-blue-500';
          
          container.innerHTML += `
            <div class="bg-white rounded-3xl shadow-sm border border-orange-50 overflow-hidden card-zoom">
              <div class="h-48 overflow-hidden bg-orange-50 flex items-center justify-center relative">
                ${isImg ? `<img src="${item.fileUrl.replace('open?id=', 'uc?export=view&id=')}" class="w-full h-full object-cover">` 
                        : `<i class="fas ${icon} text-6xl opacity-50"></i>`}
                <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold shadow-sm ${getTypeColor(item.actionType)}">
                  ${item.actionType}
                </div>
              </div>
              <div class="p-5">
                <div class="text-xs text-orange-400 font-bold mb-1 uppercase tracking-wider">${item.date}</div>
                <h3 class="font-bold text-lg text-gray-800 leading-tight mb-2">${item.equipment}</h3>
                <div class="flex flex-wrap gap-2 text-sm text-gray-600 mb-4">
                  <span class="bg-gray-100 px-2 py-1 rounded-md">SN: ${item.serialNo}</span>
                  <span class="bg-gray-100 px-2 py-1 rounded-md">จำนวน: ${item.quantity}</span>
                </div>
                <div class="flex items-center justify-between pt-4 border-t border-gray-50">
                   <span class="text-xs text-gray-400"><i class="fas fa-user-edit mr-1"></i> ${item.submittedBy}</span>
                   <a href="${item.fileUrl}" target="_blank" class="bg-orange-50 text-orange-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-orange-600 hover:text-white transition">
                     เปิดไฟล์ผลงาน
                   </a>
                </div>
              </div>
            </div>
          `;
        });
      }).getDataAndStats();
    }

    function renderDashboard(stats) {
      const dash = document.getElementById('dashboardGrid');
      dash.innerHTML = '';
      for (const [name, val] of Object.entries(stats)) {
        const net = val.in - val.out;
        dash.innerHTML += `
          <div class="bg-white p-3 rounded-2xl shadow-sm border-b-4 border-orange-400">
            <p class="text-[10px] font-bold text-gray-400 uppercase truncate">${name}</p>
            <div class="flex justify-between items-end mt-1">
              <span class="text-xl font-bold text-orange-600">${net}</span>
              <span class="text-[10px] text-orange-300">ซัก: ${val.wash}</span>
            </div>
          </div>
        `;
      }
    }

    function getTypeColor(type) {
      if (type === 'รับเข้า') return 'text-green-600';
      if (type === 'จ่ายออก') return 'text-blue-600';
      return 'text-orange-600';
    }

    window.onload = loadData;
  </script>
</body>
</html>
