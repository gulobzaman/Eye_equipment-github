<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background: #fffcf9; }
    .orange-gradient { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    .loader { border-top-color: #f97316; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen pb-12">

  <header class="orange-gradient text-white shadow-lg p-6 rounded-b-[3rem] mb-8">
    <div class="container mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold flex items-center gap-2">
          <i class="fas fa-eye"></i> OR-SKT EYE SYSTEM
        </h1>
        <p class="text-orange-100 text-sm">ระบบจัดเก็บข้อมูลเครื่องมือผ่าตัดตา</p>
      </div>
      <button onclick="openForm()" class="bg-white text-orange-600 px-6 py-2 rounded-full font-bold shadow-md hover:scale-105 transition active:scale-95">
        <i class="fas fa-plus"></i> บันทึกข้อมูล
      </button>
    </div>
  </header>

  <main class="container mx-auto px-4">
    
    <h2 class="text-xl font-bold text-orange-800 mb-4 px-2">ยอดคงคลังเครื่องมือ (Dashboard)</h2>
    <div id="dashContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-10 overflow-x-auto">
      </div>

    <div class="flex justify-between items-center mb-6 px-2">
      <h2 class="text-xl font-bold text-gray-700">ประวัติการดำเนินงานล่าสุด</h2>
      <button onclick="loadData()" class="text-orange-500 hover:rotate-180 transition-all duration-500">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>

    <div id="loading" class="flex flex-col items-center py-20">
      <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mb-4"></div>
      <p class="text-orange-600 font-medium">กำลังประมวลผลข้อมูล...</p>
    </div>

    <div id="listGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      </div>
  </main>

  <div id="formModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden animate-slide-up">
      <div class="bg-orange-500 p-6 text-white flex justify-between items-center">
        <h3 class="text-xl font-bold"><i class="fas fa-edit mr-2"></i>บันทึกรายการเครื่องมือ</h3>
        <button onclick="closeForm()" class="text-2xl">&times;</button>
      </div>
      
      <form id="toolForm" class="p-8 space-y-4 max-h-[80vh] overflow-y-auto" oninput="checkForm()">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-orange-700">สถานะ</label>
            <select id="status" required class="w-full border-2 border-orange-100 p-3 rounded-xl focus:border-orange-500 outline-none">
              <option value="">เลือก...</option>
              <option value="รับเข้า">รับเข้า</option>
              <option value="จ่ายออก">จ่ายออก</option>
              <option value="ส่งผ้าซัก">ส่งผ้าซัก</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold text-orange-700">จำนวน</label>
            <input type="number" id="qty" required placeholder="0" class="w-full border-2 border-orange-100 p-3 rounded-xl outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-orange-700">รายการอุปกรณ์</label>
          <select id="equipment" required class="w-full border-2 border-orange-100 p-3 rounded-xl focus:border-orange-500 outline-none">
            <option value="">เลือกอุปกรณ์...</option>
            <option value="ผ้าตา">ผ้าตา</option><option value="Fusion Dual Pump">Fusion Dual Pump</option>
            <option value="เครื่องมือตา">เครื่องมือตา</option><option value="set ล้างตา">set ล้างตา</option>
            <option value="เครื่องมือแยก">เครื่องมือแยก</option><option value="ตัวจับกล้อง">ตัวจับกล้อง</option>
            <option value="จี้ตา">จี้ตา</option><option value="set Blepharo">set Blepharo</option>
            <option value="เลนส์nanex">เลนส์nanex</option><option value="ผ้ารูตา">ผ้ารูตา</option>
            <option value="ด้าม blad">ด้าม blad</option><option value="ถ้วย">ถ้วย</option>
            <option value="ชุด Forcep">ชุด Forcep</option><option value="Hand pice">Hand pice</option>
            <option value="Westcot tenotomy E25-334">Westcot tenotomy E25-334</option>
            <option value="Eye spce ขดลวด">Eye spce ขดลวด</option><option value="Holder ดัดเข็ม">Holder ดัดเข็ม</option>
            <option value="SR">SR</option><option value="ชุด ECCE (7ชิ้น)">ชุด ECCE (7ชิ้น)</option>
            <option value="Corneal scissors">Corneal scissors</option><option value="Simco">Simco</option>
            <option value="0.12 forcep Taitanium">0.12 forcep Taitanium</option><option value="Lester Lens">Lester Lens</option>
            <option value="Sinskey">Sinskey</option><option value="Caliper">Caliper</option>
            <option value="ถ้วย">ถ้วย</option><option value="Clamp โค้ง">Clamp โค้ง</option>
            <option value="ชุด Tx">ชุด Tx</option><option value="ถาด scrub ตา">ถาด scrub ตา</option>
            <option value="อับสำลีเล็ก">อับสำลีเล็ก</option><option value="ยกเลิก จี้ตาหัวกลม">ยกเลิก จี้ตาหัวกลม</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-orange-700">Serial No.</label>
            <input type="text" id="serialNo" required placeholder="SN-xxxx" class="w-full border-2 border-orange-100 p-3 rounded-xl outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-orange-700">ส่งข้อมูลโดย</label>
            <input type="text" id="user" required placeholder="ชื่อพยาบาล" class="w-full border-2 border-orange-100 p-3 rounded-xl outline-none">
          </div>
        </div>

        <div class="bg-orange-50 p-4 rounded-2xl border-2 border-dashed border-orange-200">
          <label class="block text-sm font-bold text-orange-800 mb-2">อัปโหลดรูปภาพ/ไฟล์</label>
          <input type="file" id="fileIn" onchange="handleFile(this)" class="text-sm block w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-orange-100 file:text-orange-700">
          <img id="preview" class="mt-4 hidden max-h-40 rounded-lg mx-auto shadow-sm">
        </div>

        <button type="button" id="btnSubmit" disabled onclick="saveData()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg disabled:bg-gray-200 transition active:scale-95">
          <i class="fas fa-paper-plane mr-2"></i> ส่งข้อมูลไปที่ Sheet
        </button>
      </form>
    </div>
  </div>

  <footer class="mt-12 text-center text-gray-400 p-8 border-t border-orange-50">
    <p class="text-sm italic">Copyright © 2026 ระบบจัดเก็บข้อมูลเครื่องมือผ่าตัดตา | By พยาบาลตา OR-SKT</p>
  </footer>

  <script>
    let fileStore = { data: null, name: "", type: "" };

    function openForm() { document.getElementById('formModal').classList.remove('hidden'); }
    function closeForm() { document.getElementById('formModal').classList.add('hidden'); }

    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        fileStore = { data: e.target.result, name: file.name, type: file.type };
        if (file.type.startsWith('image/')) {
          const pre = document.getElementById('preview');
          pre.src = e.target.result;
          pre.classList.remove('hidden');
        }
      };
      reader.readAsDataURL(file);
    }

    function checkForm() {
      const isValid = document.getElementById('toolForm').checkValidity();
      document.getElementById('btnSubmit').disabled = !isValid;
    }

    function saveData() {
      const btn = document.getElementById('btnSubmit');
      btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> กำลังบันทึก...';
      btn.disabled = true;

      const payload = {
        status: document.getElementById('status').value,
        equipment: document.getElementById('equipment').value,
        qty: document.getElementById('qty').value,
        serialNo: document.getElementById('serialNo').value,
        user: document.getElementById('user').value,
        fileData: fileStore.data,
        fileName: fileStore.name,
        fileType: fileStore.type
      };

      google.script.run.withSuccessHandler(() => {
        alert('บันทึกสำเร็จ!');
        location.reload();
      }).processForm(payload);
    }

    function loadData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('listGrid').innerHTML = '';
      
      google.script.run.withSuccessHandler(res => {
        document.getElementById('loading').classList.add('hidden');
        renderDashboard(res.dashboard);
        
        const grid = document.getElementById('listGrid');
        res.items.forEach(item => {
          const isImg = item.fileMime.startsWith('image/');
          const icon = item.fileMime.includes('pdf') ? 'fa-file-pdf text-red-500' : 'fa-file-word text-blue-500';
          
          grid.innerHTML += `
            <div class="bg-white rounded-[2rem] shadow-sm border border-orange-50 overflow-hidden hover:shadow-md transition card-item">
              <div class="h-44 bg-orange-50 relative flex items-center justify-center">
                ${isImg ? `<img src="${item.fileUrl.replace('open?id=', 'uc?export=view&id=')}" class="w-full h-full object-cover">` 
                        : `<i class="fas ${icon} text-5xl opacity-40"></i>`}
                <span class="absolute top-4 right-4 text-[10px] bg-white/80 backdrop-blur px-3 py-1 rounded-full font-bold text-orange-600 shadow-sm">${item.status}</span>
              </div>
              <div class="p-6">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">${item.date}</p>
                <h4 class="font-bold text-gray-800 text-lg leading-tight mb-2">${item.equipment}</h4>
                <div class="flex justify-between items-center mb-4">
                  <span class="text-sm bg-orange-50 text-orange-700 px-3 py-1 rounded-lg">SN: ${item.serialNo}</span>
                  <span class="font-bold text-orange-600">x${item.qty}</span>
                </div>
                <div class="flex items-center justify-between border-t border-orange-50 pt-4">
                  <span class="text-xs text-gray-400 font-medium italic">by ${item.user}</span>
                  <a href="${item.fileUrl}" target="_blank" class="text-xs font-bold text-orange-500 hover:underline">เปิดไฟล์ผลงาน <i class="fas fa-external-link-alt ml-1"></i></a>
                </div>
              </div>
            </div>
          `;
        });
      }).fetchAllData();
    }

    function renderDashboard(data) {
      const container = document.getElementById('dashContainer');
      container.innerHTML = '';
      for (const [name, val] of Object.entries(data)) {
        const net = val.in - val.out;
        container.innerHTML += `
          <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-orange-400 min-w-[140px]">
            <p class="text-[10px] font-bold text-gray-400 truncate mb-1 uppercase">${name}</p>
            <div class="flex items-baseline gap-1">
              <span class="text-xl font-bold text-orange-600">${net}</span>
              <span class="text-[10px] text-gray-400 italic">เหลือ</span>
            </div>
            <p class="text-[9px] text-orange-300 mt-1">ส่งซักสะสม: ${val.wash}</p>
          </div>
        `;
      }
    }

    window.onload = loadData;
  </script>
</body>
</html>
